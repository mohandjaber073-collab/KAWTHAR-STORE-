<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-ar="المتجر | كوثر" data-en="Shop | Kawthar">المتجر | كوثر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&family=Cairo:wght@300;400;500;600;700&family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.shop-hero{
  padding: calc(var(--nav-h) + 60px) 48px 50px;
  text-align:center;
  background: linear-gradient(135deg, var(--cream) 0%, var(--pink-soft) 100%);
}
.shop-hero h1{
  font-family:var(--font-display);
  font-size: clamp(48px, 6vw, 80px);
  font-weight:500;line-height:1.05;color:var(--text);
  margin-bottom:14px;letter-spacing:1px;
}
.shop-hero h1 em{color:var(--gold);font-style:italic;font-weight:400}
.shop-hero p{color:var(--text-mid);font-size:16px;max-width:540px;margin:0 auto}
.shop-main{padding:0 48px 110px;background:var(--bg)}
@media(max-width:768px){
  .shop-hero{padding: calc(var(--nav-h) + 30px) 22px 30px}
  .shop-main{padding:0 22px 80px}
}
</style>
</head>
<body>

<nav></nav>

<section class="shop-hero">
  <h1>
    <span data-ar="كل ما تحتاجينه" data-en="Everything">كل ما تحتاجينه</span>
    <em data-ar="لبشرة مشرقة" data-en="you need">لبشرة مشرقة</em>
  </h1>
  <p data-ar="أكثر من 200 منتج أصلي من أفضل الماركات العالمية — اختاري ما يناسب بشرتك"
     data-en="Over 200 authentic products from the world's finest brands — find exactly what your skin loves.">
    أكثر من 200 منتج أصلي من أفضل الماركات العالمية — اختاري ما يناسب بشرتك
  </p>
</section>

<main class="shop-main">
  <div class="sticky-filter">

    <!-- Row 1: search + sort + price -->
    <div class="filter-toprow">
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="7"/><path d="M20 20l-4.3-4.3"/></svg>
        <input type="text" id="searchInput"
               data-ar-placeholder="ابحثي عن منتج أو ماركة..."
               data-en-placeholder="Search a product or brand..."
               placeholder="ابحثي عن منتج أو ماركة...">
      </div>

      <select id="sortSelect" class="filter-select">
        <option value="default"      data-ar="ترتيب"            data-en="Sort">ترتيب</option>
        <option value="price-asc"    data-ar="السعر: الأقل"     data-en="Price: Low–High">السعر: الأقل</option>
        <option value="price-desc"   data-ar="السعر: الأعلى"    data-en="Price: High–Low">السعر: الأعلى</option>
        <option value="top-rated"    data-ar="الأعلى تقييماً"   data-en="Top Rated">الأعلى تقييماً</option>
        <option value="best-selling" data-ar="الأكثر مبيعاً"   data-en="Best Selling">الأكثر مبيعاً</option>
      </select>

      <select id="priceSelect" class="filter-select">
        <option value="all"   data-ar="كل الأسعار"   data-en="All Prices">كل الأسعار</option>
        <option value="0-60"  data-ar="أقل من ₪60"   data-en="Under ₪60">أقل من ₪60</option>
        <option value="60-80" data-ar="₪60 — ₪80"    data-en="₪60 — ₪80">₪60 — ₪80</option>
        <option value="80-100"data-ar="₪80 — ₪100"   data-en="₪80 — ₪100">₪80 — ₪100</option>
        <option value="100+"  data-ar="أكثر من ₪100" data-en="Over ₪100">أكثر من ₪100</option>
      </select>
    </div>

    <!-- Row 2: category pills -->
    <div class="cat-pills-row">
      <button class="filter-btn active" onclick="filterProducts('all',this)"          data-ar="الكل"       data-en="All">الكل</button>
      <button class="filter-btn"        onclick="filterProducts('serum',this)"        data-ar="سيروم"      data-en="Serum">سيروم</button>
      <button class="filter-btn"        onclick="filterProducts('moisturizer',this)"  data-ar="مرطب"       data-en="Moisturizer">مرطب</button>
      <button class="filter-btn"        onclick="filterProducts('cleanser',this)"     data-ar="غسول"       data-en="Cleanser">غسول</button>
      <button class="filter-btn"        onclick="filterProducts('sunscreen',this)"    data-ar="واقي شمس"   data-en="Sunscreen">واقي شمس</button>
      <button class="filter-btn"        onclick="filterProducts('toner',this)"        data-ar="تونر"       data-en="Toner">تونر</button>
      <button class="filter-btn"        onclick="filterProducts('eye',this)"          data-ar="عيون"       data-en="Eyes">عيون</button>
      <button class="filter-btn"        onclick="filterProducts('mask',this)"         data-ar="ماسك"       data-en="Masks">ماسك</button>
      <button class="filter-btn"        onclick="filterProducts('hair',this)"         data-ar="شعر"        data-en="Hair">شعر</button>
    </div>

  </div>

  <div class="product-count" id="productCount"></div>
  <div class="product-grid" id="productGrid"></div>
</main>

<footer></footer>

<script src="shared.js"></script>
<script src="shop.js"></script>
</body>
</html>
